<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0E0F12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <meta name="apple-mobile-web-app-title" content="Matwana" />
  <title>Matwana</title>
  <link rel="stylesheet" href="/node_modules/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/style.css" />

  <!-- SVG icon sprite -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
    <symbol id="icon-map" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
      <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
    </symbol>
    <symbol id="icon-compass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
    </symbol>
    <symbol id="icon-tag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
      <line x1="7" y1="7" x2="7.01" y2="7"/>
    </symbol>
    <symbol id="icon-swap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 3 21 8 16 13"/><line x1="21" y1="8" x2="9" y2="8"/>
      <polyline points="8 21 3 16 8 11"/><line x1="3" y1="16" x2="15" y2="16"/>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </symbol>
    <symbol id="icon-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </symbol>
    <symbol id="icon-bus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21l4-4 4 4"/>
      <line x1="2" y1="11" x2="22" y2="11"/><line x1="7" y1="3" x2="7" y2="11"/>
      <line x1="17" y1="3" x2="17" y2="11"/>
      <circle cx="7" cy="17" r="1"/><circle cx="17" cy="17" r="1"/>
    </symbol>
    <symbol id="icon-transfer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/>
      <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/>
    </symbol>
    <symbol id="icon-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </symbol>
    <symbol id="icon-chevron-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </symbol>
    <symbol id="icon-building" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="7" width="20" height="14" rx="1"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
    </symbol>
    <symbol id="icon-warning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </symbol>
    <symbol id="icon-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </symbol>
    <symbol id="icon-wifi-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"/>
    </symbol>
    <symbol id="icon-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </symbol>
  </svg>
</head>
<body>
  <div id="app">
    <!-- Status bar -->
    <div class="status-bar" id="status-bar" hidden>
      <svg class="status-bar__icon"><use href="#icon-wifi-off"/></svg>
      <span class="status-bar__text">Offline — routing from cached graph</span>
    </div>

    <!-- Graph loading banner -->
    <div class="graph-banner" id="graph-banner" hidden>
      <div class="graph-banner__inner">
        <div class="spinner spinner--sm"></div>
        <span>Loading routing graph…</span>
      </div>
    </div>

    <!-- Main content -->
    <main class="main" id="main">
      <!-- Plan view -->
      <div class="view" id="view-plan" role="tabpanel" aria-labelledby="tab-plan">
        <!-- Populated by plan.js -->
      </div>

      <!-- Discover view -->
      <div class="view" id="view-discover" role="tabpanel" aria-labelledby="tab-discover" hidden>
        <!-- Populated by discover.js -->
      </div>

      <!-- Fares view -->
      <div class="view" id="view-fares" role="tabpanel" aria-labelledby="tab-fares" hidden>
        <!-- Populated by fares.js -->
      </div>
    </main>

    <!-- Bottom tab navigation -->
    <nav class="bottom-nav" role="tablist" aria-label="App sections">
      <button class="nav-tab active" id="tab-plan" role="tab"
        aria-selected="true" aria-controls="view-plan" data-view="plan">
        <svg class="nav-tab__icon"><use href="#icon-map"/></svg>
        <span class="nav-tab__label">Plan</span>
      </button>
      <button class="nav-tab" id="tab-discover" role="tab"
        aria-selected="false" aria-controls="view-discover" data-view="discover">
        <svg class="nav-tab__icon"><use href="#icon-compass"/></svg>
        <span class="nav-tab__label">Discover</span>
      </button>
      <button class="nav-tab" id="tab-fares" role="tab"
        aria-selected="false" aria-controls="view-fares" data-view="fares">
        <svg class="nav-tab__icon"><use href="#icon-tag"/></svg>
        <span class="nav-tab__label">Fares</span>
      </button>
    </nav>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
